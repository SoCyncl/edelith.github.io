
<!DOCTYPE html>
<html>
<head>
<head>
    <link rel="icon" type="image/x-icon" href="/assets/img/ico/white.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Characters - Solstitheo Archives</title>
    <meta name="description" content="A directory of all characters in the Solstitheo worldbuilding project — from the main party and the residents of Tarpaul Pit, to the Steelside Legion, Bjornguard, Woodsworn, and beyond.">
    <meta name="author" content="Solstitheo Archives">
    <meta name="keywords" content="characters, Tarpaul Pit, Steelside Legion, Bjornguard, Woodsworn, Winds of the Waste, Baylis, Skrapp, Peggle Krastov, Herb Passerine, Edelith, Solstitheo, DnD">
    <meta name="theme-color" content="#2a211b">
    <link rel="canonical" href="https://edelith.org/characters/index.html">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://edelith.org/characters/index.html">
    <meta property="og:title" content="Characters - Solstitheo Archives">
    <meta property="og:description" content="A directory of all characters in the Solstitheo worldbuilding project — from the main party and the residents of Tarpaul Pit, to the Steelside Legion, Bjornguard, Woodsworn, and beyond.">
    <meta property="og:image" content="https://edelith.org/assets/img/favicon.png">
    <meta property="og:image:alt" content="Solstitheo Archives">
    <meta property="og:site_name" content="Solstitheo Archives">
    <meta property="og:locale" content="en_US">
	
    <link rel="stylesheet" href="/css/home.css">
    <script src="../kit.fontawesome.com/59604fa9da.js" crossorigin="anonymous"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js"></script>
    <script src="/scripts/isotope.pkgd.min.js"></script>
    <script src="/scripts/home-footer.js" type="text/javascript" defer></script>
    <script src="/scripts/randomizer.js" type="text/javascript" defer></script>
    <script src="/scripts/header.js" type="text/javascript" defer></script>
	<script src="/scripts/char-loader.js" type="text/javascript" defer></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="/scripts/playlist.js" type="text/javascript" defer></script>
    <script src="/scripts/sidenav.js" defer></script>
  <script>
    window.addEventListener("load", () => {
      document.querySelectorAll(".fade-block").forEach((el, i) =>
        setTimeout(() => el.classList.add("visible"), i * 70)
      );
    });
  </script>
</head>
<body>

<!-- ─── CLOUDS ────────────────────────────────────────── -->
<div class="clouds">
  <div class="clouds-1"></div>
  <div class="logo"><img src="/assets/img/themes/default/logo.png" alt="Solstitheo Archives"></div>
  <div class="clouds-2"></div>
  <div class="clouds-3"></div>
</div>

<transparent-navbar class="fade-block"></transparent-navbar>

<div class="outer">
  <div class="all-content fade-block">
    <playlist-block></playlist-block>
    <div class="char-page">

      <!-- ══ MASTHEAD ════════════════════════════════════ -->
      <div class="char-masthead lore-box lore-box--gold fade-block">
        <div class="char-masthead-inner">
          <div class="char-masthead-label">Solstitheo Archives  ◆  Roster</div>
          <div class="char-masthead-flex">
            <div>
              <h1 class="char-masthead-title">Character Overview</h1>
              <div class="char-masthead-rule">
                <div class="char-rule-line"></div>
                <span>✦</span>
                <div class="char-rule-line char-rule-line--rev"></div>
              </div>
              <p class="char-masthead-desc">
                The players, allies, and figures of the Immortal City of Edelith — catalogued for the discerning archivist.
              </p>
            </div>
            <div class="char-masthead-watermark">Edelith</div>
          </div>
        </div>
        <div class="char-masthead-vol">
          <span>Immortal City of Edelith</span>
          <span class="char-vol-dot">◆</span>
          <span>Campaign Roster</span>
        </div>
      </div>

      <!-- ══ FILTER BAR ═════════════════════════════════ -->
      <div class="fff-controls fade-block">
        <div class="fff-filters-group">
          <span class="fff-controls-label">Filter by</span>
          <div class="fff-filters" id="charFilters">
            <button class="fff-filter-btn active" data-filter="*">Everyone</button>
            <button class="fff-filter-btn" data-filter=".main">Main Party</button>
            <button class="fff-filter-btn" data-filter=".tarpaul">Tarpaul Pit</button>
            <button class="fff-filter-btn" data-filter=".macrabell">Macrabell</button>
            <button class="fff-filter-btn" data-filter=".arvegum">New Arvegum</button>
            <button class="fff-filter-btn" data-filter=".torthuil">Torthuil</button>
            <button class="fff-filter-btn" data-filter=".seversova">Manor Seversova</button>
            <button class="fff-filter-btn" data-filter=".bjornguard">Bjornguard</button>
            <button class="fff-filter-btn" data-filter=".fang">Iron Fang Sect</button>            
            <button class="fff-filter-btn" data-filter=".misc">Misc</button>
          </div>
        </div>
        <div class="fff-sort-group">
          <span class="fff-controls-label">Sort by</span>
          <div class="fff-sort" id="charSort">
            <button class="fff-sort-btn active" data-sort="date" data-order="desc">Newest</button>
            <button class="fff-sort-btn"        data-sort="date" data-order="asc">Oldest</button>
            <button class="fff-sort-btn"        data-sort="name" data-order="asc">Name</button>
          </div>
        </div>
      </div>

      <!-- ══ SEARCH ══════════════════════════════════════ -->
      <div class="char-search-wrap fade-block">
        <div class="char-search-box">
          <i class="fa-solid fa-magnifying-glass char-search-icon"></i>
          <input
            id="charSearch"
            class="char-search-input"
            type="text"
            placeholder="Search by name or race…"
            autocomplete="off"
            spellcheck="false"
          >
          <button class="char-search-clear" id="charSearchClear" aria-label="Clear">✕</button>
        </div>
      </div>

      <!-- ══ CHARACTER GRID — populated by char-loader.js ═ -->
      <div class="character-select fade-block" id="charGrid"></div>

    </div>
  </div>
</div>

<footer-block class="fade-block"></footer-block>

<!-- ─── INIT ──────────────────────────────────────────── -->
<script>
  $(document).ready(function () {
    CharLoader.initFullPage({
      gridId:    'charGrid',
      filtersId: 'charFilters',
      sortId:    'charSort',
      searchId:  'charSearch',
      clearId:   'charSearchClear',
      dataUrl:   '/data/characters.json'
    });
  });
</script>

<!-- ─── STYLES ────────────────────────────────────────── -->
<style>

.char-page {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-width: 100%;
  margin: 0 auto;
}

/* ══ MASTHEAD ══════════════════════════════════════════ */
.char-masthead {
  padding: 32px 40px 22px;
  margin-bottom: 0;
  position: relative;
  overflow: hidden;
}
.char-masthead-inner { position: relative; z-index: 2; }

.char-masthead-label {
  font-family: var(--f-label);
  font-size: 0.55rem; letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold); opacity: 0.7;
  margin-bottom: 10px; text-align: center;
}

.char-masthead-flex {
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}

.char-masthead-title {
  font-family: var(--f-display);
  font-size: 2.2rem; letter-spacing: 3px;
  color: var(--frost);
  background: none; padding: 0;
  margin: 0 0 12px; line-height: 1.1;
  text-align: center;
}

.char-masthead-watermark {
  font-family: var(--f-display);
  font-size: 5.5rem;
  color: rgba(201,168,76,0.14);
  letter-spacing: 8px; line-height: 1;
  white-space: nowrap;
  pointer-events: none; user-select: none;
  text-transform: uppercase;
  position: absolute; right: 50px; top: 82px;
}

.char-masthead-rule {
  display: flex; align-items: center;
  gap: 10px; margin: 10px 0 14px;
}
.char-masthead-rule span { color: var(--gold); font-size: 0.7rem; flex-shrink: 0; }
.char-rule-line { height: 1px; flex: 1; background: linear-gradient(90deg, var(--gold-dim), transparent); }
.char-rule-line--rev { background: linear-gradient(270deg, var(--gold-dim), transparent); }

.char-masthead-desc {
  font-family: var(--f-italic); font-style: italic;
  font-size: 1.2rem; line-height: 1.7;
  color: var(--fog); margin: 0; text-align: center;
}

.char-masthead-vol {
  display: flex; align-items: center; gap: 10px;
  margin-top: 20px; padding-top: 14px;
  border-top: 1px dashed rgba(201,168,76,0.2);
  font-family: var(--f-label);
  font-size: 0.58rem; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--fog-dim);
  position: relative; z-index: 2;
}
.char-vol-dot { color: var(--gold-dim); font-size: 0.5rem; }

/* ══ SEARCH ════════════════════════════════════════════ */
.char-search-wrap {
  display: flex;
  justify-content: center;
  padding: 28px 20px 4px;
}

.char-search-box {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 500px;
  border-bottom: 1px solid rgba(201,168,76,0.25);
  transition: border-color 0.25s ease;
}
.char-search-box:focus-within {
  border-color: rgba(201,168,76,0.7);
}

.char-search-icon {
  color: rgba(201,168,76,0.45);
  font-size: 0.78rem;
  flex-shrink: 0;
  margin-right: 12px;
  transition: color 0.2s ease;
}
.char-search-box:focus-within .char-search-icon {
  color: rgba(201,168,76,0.85);
}

.char-search-input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  font-family: var(--f-label, 'Cinzel', serif);
  font-size: 0.8rem; letter-spacing: 2px;
  color: var(--fog, #c4b998);
  padding: 10px 0;
  caret-color: var(--gold, #c9a84c);
}
.char-search-input::placeholder {
  color: rgba(201,168,76,0.22);
  letter-spacing: 2px;
}

.char-search-clear {
  background: none; border: none;
  color: rgba(201,168,76,0.4);
  font-size: 0.65rem; cursor: pointer;
  padding: 4px 8px; flex-shrink: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s ease, color 0.15s ease;
}
.char-search-clear.visible { opacity: 1; pointer-events: auto; }
.char-search-clear:hover   { color: var(--gold, #c9a84c); }

/* ══ CONTROLS ══════════════════════════════════════════ */
.fff-controls {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 16px;
  padding: 18px 22px;
  background: var(--void);
  border-left: 3px solid var(--gold-dim);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  margin: 20px 0 0;
}

.fff-controls-label {
  font-family: var(--f-label);
  font-size: 0.55rem; letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--fog-dim);
  display: block; margin-bottom: 8px;
}

.fff-filters-group { flex: 1; min-width: 0; }
.fff-sort-group    { flex-shrink: 0; }

.fff-filters, .fff-sort {
  display: flex; align-items: center; flex-wrap: wrap; gap: 4px 0;
}

.fff-filter-btn, .fff-sort-btn {
  font-family: var(--f-label);
  font-size: 0.87rem; letter-spacing: 1px;
  background: none; border: none;
  color: var(--fog-dim); cursor: pointer;
  padding: 4px 10px; position: relative;
  transition: color 0.2s ease; white-space: nowrap;
}
.fff-filters .fff-filter-btn + .fff-filter-btn::before,
.fff-sort    .fff-sort-btn   + .fff-sort-btn::before {
  content: "◆";
  position: absolute; left: -1px;
  font-size: 0.35rem; color: var(--gold-dim);
  top: 50%; transform: translateY(-50%);
}
.fff-filter-btn:hover, .fff-sort-btn:hover { color: var(--fog); }
.fff-filter-btn.active, .fff-sort-btn.active { color: var(--frost); }
.fff-filter-btn.active::after, .fff-sort-btn.active::after {
  content: "";
  position: absolute; bottom: 0; left: 10px; right: 10px;
  height: 1px; background: var(--gold);
}

/* ══ GRID ══════════════════════════════════════════════ */
.character-select {
  position: relative;
}

.char { display: inline-block; }

/* ── Card ── */
.bg {
  position: absolute;
  width: 100%; height: 100%; z-index: -1;
  background-size: cover; background-position: center;
  background-repeat: no-repeat;
}

.card {
  display: block;
  margin: 25px;
  height: 450px; width: 260px;
  border-radius: 0;
  background: transparent;
  position: relative; overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.24s ease-in-out;
  text-decoration: none;
}
.card:hover {
  box-shadow: 0 0 2rem rgba(147,115,65,0.25), 0 0 1.8rem rgba(0,0,0,0.75);
  transform: scale(1.2);
}
.card:hover .card-info  { transform: translateY(0); border-color: rgb(147 115 65); }
.card:hover .see-more   { border-top: 1px solid rgb(147 115 65); }

.card-info {
  display: flex; flex-direction: column;
  position: absolute; bottom: 0; left: 0; width: 100%;
  background-color: rgba(17,19,24,0.88);
  border-top: 1px solid rgb(147 115 65);
  border-right: 1px solid transparent;
  border-bottom: 1px solid transparent;
  border-left: 1px solid transparent;
  transform: translateY(46px);
  transition: transform 0.28s ease-in-out, border-color 0.25s ease-in-out;
  will-change: transform;
}

.card-info-section { display: flex; height: 100%; width: 100%; }

.card-info__faction {
  flex: 2; height: 65px;
  display: flex; justify-content: center; align-items: center;
  flex-direction: column;
  font-size: 12px; letter-spacing: 2px;
  text-transform: uppercase;
  border-right: 1px solid rgba(81,66,46,0.5);
  font-weight: 700;
}
.card-info__name   { color: #937341; font-size: 15px; text-align: center; }
.card-info__region { color: #c4b998; padding-top: 4px; }

.see-more {
  color: #937341;
  display: flex; justify-content: center; align-items: center;
  letter-spacing: 3px; text-transform: uppercase;
  font-size: 9px; height: 46px;
  border-top: 1px solid transparent;
  transition: border-top 0.25s ease-in-out;
}
.arrow { margin-left: 8px; }
.arrow svg { width: 12.5px; fill: #937341; }

</style>

</body>
</html>
