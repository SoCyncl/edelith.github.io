<footer-block class="fade-block"></footer-block>

<!-- ─── INIT ──────────────────────────────────────────── -->
<script>
  $(document).ready(function () {
    CharLoader.initFullPage({
      gridId:    'charGrid',
      filtersId: 'charFilters',
      sortId:    'charSort',
      searchId:  'charSearch',
      clearId:   'charSearchClear',
      dataUrl:   '/data/characters.json'
    });
  });
</script>
<script>
/**
 * ═══════════════════════════════════════════════════════════════
 *  char-loader.js  ·  Solstitheo Archives
 *  Renders character cards from /data/characters.json
 *
 *  ── FULL PAGE (characters/index.html) ──────────────────────────
 *  Requires: jQuery, imagesLoaded, isotope
 *
 *    CharLoader.initFullPage({
 *      gridId:    'charGrid',       // id of the .character-select container
 *      filtersId: 'charFilters',    // id of the filter button group
 *      sortId:    'charSort',       // id of the sort button group
 *      searchId:  'charSearch',     // id of the search <input>
 *      clearId:   'charSearchClear' // id of the clear <button>
 *    });
 *
 *  ── EMBED ON ANY OTHER PAGE ────────────────────────────────────
 *  Only needs this script (no jQuery / isotope required).
 *
 *    CharLoader.embed({
 *      containerId: 'myContainer',  // id of any <div> on the page
 *      filter: 'main',              // category string OR array e.g. ['main','bjornguard']
 *                                   // omit / pass '*' for all characters
 *      limit: 4,                    // optional: max cards to show
 *      dataUrl: '/data/characters.json'  // path to JSON (default shown)
 *    });
 *
 * ═══════════════════════════════════════════════════════════════
 */

const CharLoader = (() => {

  const ARROW_SVG = `
    <svg viewBox="0 0 162 70.28">
      <circle cx="31.57" cy="35.21" r="11.57"></circle>
      <g>
        <polygon points="124.18,70.39 118.31,64.09 149.37,35.22 118.31,6.35 124.18,0.05 162,35.22"></polygon>
        <rect x="84.61" y="29.76" width="65" height="11.06"></rect>
      </g>
    </svg>`;

  // ── Build a single card element ──────────────────────────────
  function buildCard(char) {
    const categoryClasses = char.categories.join(' ');
    const href = char.link || '#';
    const tag  = char.link ? 'a' : 'div';
    const linkAttrs = char.link
      ? `href="${char.link}"`
      : '';

    const outer = document.createElement('div');
    outer.className = `char ${categoryClasses}`;
    outer.innerHTML = `
      <${tag} class="card" ${linkAttrs}
        data-name="${char.name}"
        data-date="${char.date}"
        data-bg="${char.bg}"
        data-id="${char.id}"
        ${char.link ? '' : 'style="cursor:default"'}>
        <div class="bg" style="background-image:url('${char.bg}')"></div>
        <div class="card-info">
          <div class="card-info-section">
            <div class="card-info__faction">
              <div class="card-info__name">${char.name}</div>
              <div class="card-info__region">${char.race}</div>
            </div>
          </div>
          <div class="see-more">
            ${char.link ? 'Explore' : 'Profile'}
            <div class="arrow">${ARROW_SVG}</div>
          </div>
        </div>
      </${tag}>`;
    return outer;
  }

  // ── Fetch JSON helper (works everywhere) ─────────────────────
  async function fetchChars(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`char-loader: could not load ${url} (${res.status})`);
    return res.json();
  }

  // ── FULL PAGE MODE (with Isotope) ────────────────────────────
  async function initFullPage(opts = {}) {
    const cfg = Object.assign({
      gridId:    'charGrid',
      filtersId: 'charFilters',
      sortId:    'charSort',
      searchId:  'charSearch',
      clearId:   'charSearchClear',
      dataUrl:   '/data/characters.json'
    }, opts);

    // ── Fetch with visible error handling ──────────────────────
    let chars;
    try {
      chars = await fetchChars(cfg.dataUrl);
    } catch (e) {
      console.error('[CharLoader] Failed to load character data:', e);
      const grid = document.getElementById(cfg.gridId);
      if (grid) grid.innerHTML = '<p style="color:#937341;padding:40px;text-align:center;letter-spacing:2px;">Could not load character data.<br>Check the console for details.</p>';
      return;
    }

    const $grid = $(`#${cfg.gridId}`);

    // ── Render all cards ────────────────────────────────────────
    const $items = $();
    chars.forEach(c => {
      const el = buildCard(c);
      $grid.append(el);
      $items.push(el); // collect for Isotope
    });

    // ── Init Isotope directly (no imagesLoaded needed — card
    //    images are CSS background-image, not <img> elements) ───
    const iso = $grid.isotope({
      itemSelector: '.char',
      layoutMode: 'fitRows',
      transitionDuration: '0.4s',
      sortAscending: false,
      getSortData: {
        name: el => $(el).find('.card-info__name').text().toLowerCase(),
        date: el => parseInt($(el).find('.card').attr('data-date'), 10) || 0
      },
      sortBy: 'date'
    });

    let activeFilter = '*';
    let searchQuery  = '';

    function applyFilters() {
      iso.isotope({
        filter: function () {
          const $el    = $(this);
          const name   = $el.find('.card-info__name').text().toLowerCase();
          const region = $el.find('.card-info__region').text().toLowerCase();
          const matchQ = !searchQuery || name.includes(searchQuery) || region.includes(searchQuery);
          const matchF = activeFilter === '*' || $el.is(activeFilter);
          return matchQ && matchF;
        }
      });
    }

    // ── Filter buttons ──────────────────────────────────────────
    $(`#${cfg.filtersId}`).on('click', '.fff-filter-btn', function () {
      activeFilter = $(this).attr('data-filter');
      applyFilters();
      $(`#${cfg.filtersId} .fff-filter-btn`).removeClass('active');
      $(this).addClass('active');
    });

    // ── Sort buttons ────────────────────────────────────────────
    $(`#${cfg.sortId}`).on('click', '.fff-sort-btn', function () {
      const sortBy  = $(this).attr('data-sort');
      const sortAsc = $(this).attr('data-order') === 'asc';
      iso.isotope({ sortBy, sortAscending: sortAsc });
      $(`#${cfg.sortId} .fff-sort-btn`).removeClass('active');
      $(this).addClass('active');
    });

    // ── Search ──────────────────────────────────────────────────
    let timer;
    $(`#${cfg.searchId}`).on('input', function () {
      clearTimeout(timer);
      const val = $(this).val().trim().toLowerCase();
      timer = setTimeout(() => {
        searchQuery = val;
        applyFilters();
        $(`#${cfg.clearId}`).toggleClass('visible', val.length > 0);
      }, 160);
    });

    $(`#${cfg.clearId}`).on('click', function () {
      $(`#${cfg.searchId}`).val('').trigger('input').focus();
    });
  }

  // ── EMBED MODE (no jQuery / Isotope needed) ──────────────────
async function embed(opts = {}) {
    const cfg = Object.assign({
      containerId: null,
      filter: '*',
      limit: null,
      dataUrl: '/data/characters.json'
    }, opts);

    if (!cfg.containerId) {
      console.warn('char-loader embed: containerId is required');
      return;
    }

    const container = document.getElementById(cfg.containerId);
    if (!container) {
      console.warn(`char-loader embed: element #${cfg.containerId} not found`);
      return;
    }

    const chars = await fetchChars(cfg.dataUrl);

    // Resolve filter to an array
    const filters = cfg.filter === '*'
      ? null
      : (Array.isArray(cfg.filter) ? cfg.filter : [cfg.filter]);

    let filtered = filters
      ? chars.filter(c => filters.some(f => c.categories.includes(f)))
      : chars;

    if (cfg.shuffle) filtered = filtered.sort(() => Math.random() - 0.5);
  
    if (cfg.limit) filtered = filtered.slice(0, cfg.limit);


    if (cfg.limit) filtered = filtered.slice(0, cfg.limit);

    filtered.forEach(c => container.appendChild(buildCard(c)));
  }

  return { initFullPage, embed };

})();  
</script>
<!-- ─── STYLES ────────────────────────────────────────── -->
<style>

.char-page {
  display: flex;
  flex-direction: column;
  gap: 0;
  max-width: 100%;
  margin: 0 auto;
}

/* ══ MASTHEAD ══════════════════════════════════════════ */
.char-masthead {
  padding: 32px 40px 22px;
  margin-bottom: 0;
  position: relative;
  overflow: hidden;
}
.char-masthead-inner { position: relative; z-index: 2; }

.char-masthead-label {
  font-family: var(--f-label);
  font-size: 0.55rem; letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold); opacity: 0.7;
  margin-bottom: 10px; text-align: center;
}

.char-masthead-flex {
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}

.char-masthead-title {
  font-family: var(--f-display);
  font-size: 2.2rem; letter-spacing: 3px;
  color: var(--frost);
  background: none; padding: 0;
  margin: 0 0 12px; line-height: 1.1;
  text-align: center;
}

.char-masthead-watermark {
  font-family: var(--f-display);
  font-size: 5.5rem;
  color: rgba(201,168,76,0.14);
  letter-spacing: 8px; line-height: 1;
  white-space: nowrap;
  pointer-events: none; user-select: none;
  text-transform: uppercase;
  position: absolute; right: 50px; top: 82px;
}

.char-masthead-rule {
  display: flex; align-items: center;
  gap: 10px; margin: 10px 0 14px;
}
.char-masthead-rule span { color: var(--gold); font-size: 0.7rem; flex-shrink: 0; }
.char-rule-line { height: 1px; flex: 1; background: linear-gradient(90deg, var(--gold-dim), transparent); }
.char-rule-line--rev { background: linear-gradient(270deg, var(--gold-dim), transparent); }

.char-masthead-desc {
  font-family: var(--f-italic); font-style: italic;
  font-size: 1.2rem; line-height: 1.7;
  color: var(--fog); margin: 0; text-align: center;
}

.char-masthead-vol {
  display: flex; align-items: center; gap: 10px;
  margin-top: 20px; padding-top: 14px;
  border-top: 1px dashed rgba(201,168,76,0.2);
  font-family: var(--f-label);
  font-size: 0.58rem; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--fog-dim);
  position: relative; z-index: 2;
}
.char-vol-dot { color: var(--gold-dim); font-size: 0.5rem; }

/* ══ SEARCH ════════════════════════════════════════════ */
.char-search-wrap {
  display: flex;
  justify-content: center;
  padding: 28px 20px 4px;
}

.char-search-box {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 500px;
  border-bottom: 1px solid rgba(201,168,76,0.25);
  transition: border-color 0.25s ease;
}
.char-search-box:focus-within {
  border-color: rgba(201,168,76,0.7);
}

.char-search-icon {
  color: rgba(201,168,76,0.45);
  font-size: 0.78rem;
  flex-shrink: 0;
  margin-right: 12px;
  transition: color 0.2s ease;
}
.char-search-box:focus-within .char-search-icon {
  color: rgba(201,168,76,0.85);
}

.char-search-input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  font-family: var(--f-label, 'Cinzel', serif);
  font-size: 0.8rem; letter-spacing: 2px;
  color: var(--fog, #c4b998);
  padding: 10px 0;
  caret-color: var(--gold, #c9a84c);
}
.char-search-input::placeholder {
  color: rgba(201,168,76,0.22);
  letter-spacing: 2px;
}

.char-search-clear {
  background: none; border: none;
  color: rgba(201,168,76,0.4);
  font-size: 0.65rem; cursor: pointer;
  padding: 4px 8px; flex-shrink: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s ease, color 0.15s ease;
}
.char-search-clear.visible { opacity: 1; pointer-events: auto; }

/* ══ CONTROLS ══════════════════════════════════════════ */
.fff-controls {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 16px;
  padding: 18px 22px;
  background: var(--void);
  border-left: 3px solid var(--gold-dim);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  margin: 20px 0 0;
}

.fff-controls-label {
  font-family: var(--f-label);
  font-size: 0.55rem; letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--fog-dim);
  display: block; margin-bottom: 8px;
}

.fff-filters-group { flex: 1; min-width: 0; }
.fff-sort-group    { flex-shrink: 0; }

.fff-filters, .fff-sort {
  display: flex; align-items: center; flex-wrap: wrap; gap: 4px 0;
}

.fff-filter-btn, .fff-sort-btn {
  font-family: var(--f-label);
  font-size: 0.87rem; letter-spacing: 1px;
  background: none; border: none;
  color: var(--fog-dim); cursor: pointer;
  padding: 4px 10px; position: relative;
  transition: color 0.2s ease; white-space: nowrap;
}
.fff-filters .fff-filter-btn + .fff-filter-btn::before,
.fff-sort    .fff-sort-btn   + .fff-sort-btn::before {
  content: "◆";
  position: absolute; left: -1px;
  font-size: 0.35rem; color: var(--gold-dim);
  top: 50%; transform: translateY(-50%);
}
.fff-filter-btn:hover, .fff-sort-btn:hover { color: var(--fog); }
.fff-filter-btn.active, .fff-sort-btn.active { color: var(--frost); }

  content: "";
  position: absolute; bottom: 0; left: 10px; right: 10px;
  height: 1px; background: var(--gold);
}

/* ══ GRID ══════════════════════════════════════════════ */
.character-select {
  position: relative;
}

.char { display: inline-block; }

/* ── Card ── */
.bg {
  position: absolute;
  width: 100%; height: 100%; z-index: -1;
  background-size: cover; background-position: center;
  background-repeat: no-repeat;
}

.card {
  display: block;
  margin: 25px;
  height: 450px; width: 260px;
  border-radius: 0;
  background: transparent;

  transition: transform 0.3s ease, box-shadow 0.24s ease-in-out;
  text-decoration: none;

.card:hover .card-info  { transform: translateY(0); border-color: rgb(147 115 65); }
.card:hover .see-more   { border-top: 1px solid rgb(147 115 65); }

  display: flex; flex-direction: column;
  position: absolute; bottom: 0; left: 0; width: 100%;
  background-color: rgba(17,19,24,0.88);
  border-top: 1px solid rgb(147 115 65);
  border-right: 1px solid transparent;
  border-bottom: 1px solid transparent;
  border-left: 1px solid transparent;
  transform: translateY(46px);
  transition: transform 0.28s ease-in-out, border-color 0.25s ease-in-out;
  will-change: transform;
}

.card-info-section { display: flex; height: 100%; width: 100%; }

.card-info__faction {
  flex: 2; height: 65px;
  display: flex; justify-content: center; align-items: center;
  flex-direction: column;
  font-size: 12px; letter-spacing: 2px;
  text-transform: uppercase;
  border-right: 1px solid rgba(81,66,46,0.5);
  font-weight: 700;

.card-info__name   { color: #937341; font-size: 15px; text-align: center; }
.card-info__region { color: #c4b998; padding-top: 4px; }

  display: flex; justify-content: center; align-items: center;

  border-top: 1px solid transparent;
  transition: border-top 0.25s ease-in-out;
}
.arrow { margin-left: 8px; }
.arrow svg { width: 12.5px; fill: #937341; }

</style>

</body>
