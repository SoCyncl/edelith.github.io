<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Josefin+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --void: #16191d;
  --default-text: #eaeaea;
  --nav-bg: #16191d;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
  font-size: 0.7rem;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0; left: 0; width: 100%;
  padding: 15px 30px;
  background: transparent;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 9999;
  backdrop-filter: blur(5px);
  border-bottom: 1px solid transparent;
  transition: 0.5s;
}

.navbar.scrolled {
  background: var(--void);
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

/* LOGO */
.logo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 22px;
  color: var(--default-text);
  text-decoration: none;
}

/* NAV LINKS */
.nav-links {
  display: flex;
  gap: 2px;
}

.nav-links a {
  display: flex;
  align-items: center;
  color: var(--default-text);
  text-decoration: none;
  padding: 7px 10px;
}

.nav-icon {
  width: 20px;
  margin-right: 8px;
}

/* SEARCH */
.search-wrapper {
  position: relative;
}

.search-input {
  height: 34px;
  width: 300px;
  padding-left: 36px;
  background: rgba(22,25,29,0.5);
  border: 1px solid rgba(201,168,76,0.3);
  color: white;
}

#search-results {
  position: absolute;
  top: 100%;
  width: 100%;
  background: #16191d;
  display: none;
}

/* MOBILE */
.menu-toggle {
  display: none;
}

@media (max-width:768px){
  .nav-links {
    position: fixed;
    top: 70px;
    width: 100%;
    flex-direction: column;
    transform: translateY(-150%);
    background: var(--nav-bg);
  }
  .nav-links.active {
    transform: translateY(0);
  }
  .menu-toggle {
    display: block;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="https://edelith.org" class="logo">Edelith.org</a>

  <div class="nav-links">
    <a href="https://edelith.org/">
      <img src="https://edelith.org/assets/img/homepage/Biblio_yellow.png" class="nav-icon">
      Homepage
    </a>
    <a href="https://edelith.org/quill-and-terms">Quill & Terms</a>
    <a href="https://edelith.org/characters/">Characters</a>
    <a href="https://edelith.org/recap">Recap</a>
    <a href="https://edelith.org/info">Info</a>
  </div>

  <div class="search-wrapper">
    <i class='bx bx-search' style="position:absolute; left:10px; top:8px;"></i>
    <input id="search-input" class="search-input" placeholder="Search the archive…">
    <ul id="search-results"></ul>
  </div>

  <i class='bx bx-menu menu-toggle'></i>
</nav>

<script>
const navbar = document.querySelector(".navbar");
const searchInput = document.getElementById("search-input");
const results = document.getElementById("search-results");
const toggle = document.querySelector(".menu-toggle");
const navLinks = document.querySelector(".nav-links");

let data = [];

// IMPORTANT: must be absolute URL for iframe
fetch('https://edelith.org/search-data.json')
  .then(r=>r.json())
  .then(d=>data=d);

searchInput.addEventListener("input", function(){
  const q = this.value.toLowerCase();
  results.innerHTML = "";

  if(!q){ results.style.display="none"; return; }

  const hits = data.filter(i=>i.title.toLowerCase().includes(q)).slice(0,8);

  results.style.display = "block";

  hits.forEach(item=>{
    const li = document.createElement("li");
    li.innerHTML = `<a href="${item.url}" target="_top">${item.title}</a>`;
    results.appendChild(li);
  });
});

toggle.addEventListener("click", ()=>{
  navLinks.classList.toggle("active");
});

// scroll effect
window.addEventListener("scroll", ()=>{
  navbar.classList.toggle("scrolled", window.scrollY > 50);
});
</script>

</body>
</html>
