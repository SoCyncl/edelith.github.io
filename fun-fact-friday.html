<!DOCTYPE html>
<html>
<head>
<head>
    <link rel="icon" type="image/x-icon" href="/assets/img/ico/red.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Edelith Fun Fact Friday - Solstitheo Archives</title>
    <meta name="description" content="Weekly lore entries documenting the world of the Immortal City of Edelith, organized across multiple in-universe publications.">
    <meta name="author" content="Solstitheo Archives">
    <meta name="keywords" content="Edelith, Solstitheo, DnD, lore, fun fact friday, worldbuilding, Woodsworn, Steelside, Yordenriser">
    <meta name="theme-color" content="#2a211b">
    <link rel="canonical" href="https://edelith.org/fun-fact-friday.html">

    <meta property="og:type" content="article">
    <meta property="og:url" content="https://edelith.org/fun-fact-friday.html">
    <meta property="og:title" content="Edelith Fun Fact Friday - Solstitheo Archives">
    <meta property="og:description" content="Weekly lore entries documenting the world of the Immortal City of Edelith, organized across multiple in-universe publications.">
    <meta property="og:image" content="https://edelith.org/assets/img/favicon.png">
    <meta property="og:image:alt" content="Solstitheo Archives Logo">
    <meta property="og:site_name" content="Solstitheo Archives">
    <meta property="og:locale" content="en_US">
	
    <link rel="stylesheet" href="/css/home.css">
    <script src="../kit.fontawesome.com/59604fa9da.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/scripts/home-footer.js" type="text/javascript" defer></script>
    <script src="/scripts/randomizer.js" type="text/javascript" defer></script>
    <script src="/scripts/header.js" type="text/javascript" defer></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://hammerjs.github.io/dist/hammer.min.js"></script>
    <script src="/scripts/isotope.pkgd.min.js"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="/scripts/sidenav.js" defer></script>
    <script src="/scripts/playlist.js" type="text/javascript" defer></script>
    <script src="/scripts/fff-loader.js"></script>

    <script>
        window.addEventListener("load", () => {
            document.querySelectorAll(".fade-block").forEach((el, i) =>
                setTimeout(() => el.classList.add("visible"), i * 70)
            );
        });
    </script>
</head>
<body>

<!-- ─── CLOUDS ────────────────────────────────────────── -->
<div class="clouds">
    <div class="clouds-1"></div>
    <div class="logo"><img src="/assets/img/themes/default/logo.png" alt="Solstitheo Archives" loading="eager"></div>
    <div class="clouds-2"></div>
    <div class="clouds-3"></div>
</div>

<transparent-navbar class="fade-block"></transparent-navbar>

<div class="outer">
    <nav-block class="fade-block"></nav-block>

    <div class="all-content fade-block">
        <div class="fff-page">

            <!-- ══ MASTHEAD ════════════════════════════════════ -->
            <div class="fff-masthead lore-box lore-box--gold fade-block">
                <div class="fff-masthead-inner">
                    <div class="fff-masthead-label">Edelith Fun Fact Friday</div>
                    <h1 class="fff-masthead-title">The Library</h1>
                    <div class="fff-masthead-rule">
                        <div class="fff-masthead-rule-line"></div>
                        <span>✦</span>
                        <div class="fff-masthead-rule-line"></div>
                    </div>
                    <p class="fff-masthead-desc">
                        Lore drops from the world of Edelith, compiled and catalogued.
                        Entries update weekly — look around.
                    </p>
                </div>
                <div class="fff-masthead-vol">
                    <span>Vol. I — Ongoing</span>
                    <span class="fff-masthead-dot">◆</span>
                    <span>The Immortal City of Edelith</span>
                </div>
            </div>

            <!-- ══ FILTER + SORT CONTROLS ════════════════════ -->
            <div class="fff-controls fade-block">
                <div class="fff-filters-group">
                    <span class="fff-controls-label">Filter by</span>
                    <div class="fff-filters" id="fffFilters">
                        <button class="fff-filter-btn active" data-filter="*">Everything</button>
                        <button class="fff-filter-btn" data-filter=".solstithean">Solstithean Logbook</button>
                        <button class="fff-filter-btn" data-filter=".angel">Whispers of an Angel</button>
                        <button class="fff-filter-btn" data-filter=".edelith">Travels of a Post-Wake Edelith</button>
                        <button class="fff-filter-btn" data-filter=".short">From the Grapevine</button>
                        <button class="fff-filter-btn" data-filter=".yordenriser">Chronicle of Yordenriser</button>
                        <button class="fff-filter-btn" data-filter=".steelside">Steelside Classification</button>
                        <button class="fff-filter-btn" data-filter=".sermons">Sermons</button>
                    </div>
                </div>
                <div class="fff-sort-group">
                    <span class="fff-controls-label">Sort by</span>
                    <div class="fff-sort" id="fffSort">
                        <button class="fff-sort-btn active" data-sort="newest">Newest</button>
                        <button class="fff-sort-btn" data-sort="oldest">Oldest</button>
                    </div>
                </div>
            </div>

            <!-- ══ CARD GRID — populated by fff-loader.js ════ -->
            <div class="grid fff-grid" id="fffGrid"></div>

        </div>
    </div>
</div>

<footer-block class="fade-block"></footer-block>

<!-- ─── INIT ──────────────────────────────────────────── -->
<script>
    $(document).ready(function () {
        FFFLoader.initFullPage({
            gridId:    'fffGrid',
            filtersId: 'fffFilters',
            sortId:    'fffSort',
            dataUrl:   '/data/fff-entries.json'
        });
    });
</script>

<!-- ─── PAGE-SPECIFIC STYLES ──────────────────────────── -->
<style>

.fff-page {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-width: 100%;
}

/* ══ MASTHEAD ══════════════════════════════════════════ */
.fff-masthead {
    padding: 36px 48px 28px;
    margin-bottom: 0;
    position: relative;
    overflow: hidden;
}

.fff-masthead::after {
    content: "";
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: var(--ink-mid);
    mask:
        radial-gradient(28px at 28px 28px,
            #0000 calc(98% - 6px), #000 calc(100% - 6px) 98%, #0000) -28px -28px,
        linear-gradient(90deg, #000 14px, #0000 0)
            -6px 50% / 100% calc(100% - 56px + 6px) repeat-x,
        linear-gradient(#000 14px, #0000 0)
            50% -6px / calc(100% - 56px + 6px) 100% repeat-y;
}
.fff-masthead > * { position: relative; z-index: 2; }

.fff-masthead-inner { max-width: 100%; }

.fff-masthead-label {
    font-family: var(--f-label);
    font-size: 0.6rem; letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold); opacity: 0.7;
    margin-bottom: 10px;
    text-align: center;
}

.fff-masthead-title {
    font-family: var(--f-display);
    font-size: 2.6rem; letter-spacing: 3px;
    color: var(--frost);
    background: none; padding: 0;
    margin: 0 0 14px; line-height: 1.1;
    text-align: center;
}

.fff-masthead-rule {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
}
.fff-masthead-rule span { color: var(--gold); font-size: 0.7rem; flex-shrink: 0; }
.fff-masthead-rule-line {
    height: 1px; flex: 1;
    background: linear-gradient(90deg, var(--gold-dim), transparent);
}
.fff-masthead-rule .fff-masthead-rule-line:last-child {
    background: linear-gradient(270deg, var(--gold-dim), transparent);
}

.fff-masthead-desc {
    font-family: var(--f-italic);
    font-style: italic; font-size: 1.2rem;
    line-height: 1.7; color: var(--fog);
    margin: 0;
    text-align: center;
}

.fff-masthead-vol {
    display: flex; align-items: center; gap: 10px;
    margin-top: 24px;
    padding-top: 14px;
    border-top: 1px dashed rgba(201,168,76,0.2);
    font-family: var(--f-label);
    font-size: 0.58rem; letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--fog-dim);
}
.fff-masthead-dot { color: var(--gold-dim); font-size: 0.5rem; }

/* ══ CONTROLS BAR ══════════════════════════════════════ */
.fff-controls {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
    padding: 18px 22px;
    background: var(--void);
    border-left: 3px solid var(--gold-dim);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    margin-bottom: 28px;
    position: relative;
}

.fff-controls-label {
    font-family: var(--f-label);
    font-size: 0.55rem; letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--fog-dim);
    display: block; margin-bottom: 8px;
}

.fff-filters-group { flex: 1; min-width: 0; }
.fff-sort-group    { flex-shrink: 0; }

.fff-filters,
.fff-sort {
    display: flex; align-items: center; flex-wrap: wrap; gap: 4px 0;
}

.fff-filter-btn,
.fff-sort-btn {
    font-family: var(--f-label);
    font-size: 0.87rem; letter-spacing: 1px;
    background: none; border: none;
    color: var(--fog-dim);
    cursor: var(--cursor-hover);
    padding: 4px 10px;
    position: relative;
    transition: color 0.2s ease;
    white-space: nowrap;
}

.fff-filters .fff-filter-btn + .fff-filter-btn::before,
.fff-sort .fff-sort-btn + .fff-sort-btn::before {
    content: "◆";
    position: absolute; left: -1px;
    font-size: 0.35rem; color: var(--gold-dim);
    top: 50%; transform: translateY(-50%);
}

.fff-filter-btn:hover,
.fff-sort-btn:hover { color: var(--fog); }

.fff-filter-btn.active,
.fff-sort-btn.active { color: var(--frost); }

.fff-filter-btn.active::after,
.fff-sort-btn.active::after {
    content: "";
    position: absolute;
    bottom: 0; left: 10px; right: 10px;
    height: 1px;
    background: var(--gold);
}

/* ══ CARD GRID ════════════════════════════════════════ */
.fff-grid { width: 100%; }

.grid-item {
    padding: 10px;
    width: 25%;
    content-visibility: auto;
    contain-intrinsic-size: 0 263px;
}

.news-card {
    height: 243px;
    border: 1px solid var(--gold-dim);
}

.news-card::before {
    content: ""; position: absolute; inset: 6px;
    border: 1px solid rgba(201,168,76,0.15); z-index: 3; pointer-events: none;
}

.news-card img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

</style>
