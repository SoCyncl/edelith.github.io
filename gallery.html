<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solstitheo Archives — Gallery</title>
  <meta name="description" content="Artwork gallery for the Solstitheo Archives — illustrations, doodles, and renders from the world of Edelith.">
  <meta name="theme-color" content="#2a211b">
  <link rel="preload" href="/data/gallery.json" as="fetch" crossorigin>
  <link rel="icon" type="image/x-icon" href="/assets/img/ico/purple.ico">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

  <script src="/scripts/gallery.js"></script>
  <script src="/scripts/home-footer.js" defer></script>
  <script src="/scripts/sidenav.js" defer></script>
  <script src="/scripts/playlist.js" type="text/javascript" defer></script>

  <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
  <script src="/scripts/isotope.pkgd.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body style="visibility:hidden">

<div class="clouds">
  <div class="clouds-1"></div>
  <div class="logo"><img src="/assets/img/themes/default/logo.png" alt="Solstitheo Archives"></div>
  <div class="clouds-2"></div>
  <div class="clouds-3"></div>
</div>

<transparent-navbar class="fade-block visible"></transparent-navbar>

<div class="outer">
<div class="all-content">

  <div class="gal-masthead lore-box lore-box--gold fade-block">
    <div class="gal-masthead-inner">
      <div class="gal-masthead-label">Solstitheo Archives  ◆  Gallery</div>
      <div class="gal-masthead-flex">
        <div style="flex:1">
          <h1 class="gal-masthead-title">Artwork Gallery</h1>
          <div class="gal-masthead-rule">
            <div class="gal-rule-line"></div>
            <span>✦</span>
            <div class="gal-rule-line gal-rule-line--rev"></div>
          </div>
          <p class="gal-masthead-desc">
            Illustrations, doodles, and renders from mostly Cyncl — and other artists — of the world of Edelith.
          </p>
        </div>
        <div class="gal-masthead-watermark">Gallery</div>
      </div>
    </div>
    <div class="gal-masthead-vol">
      <span><span id="stat-total">0</span> pieces</span>
      <span class="gal-vol-dot">◆</span>
      <span><span id="stat-artists">0</span> artists</span>
      <span class="gal-vol-dot">◆</span>
      <span>last updated <span id="stat-updated">—</span></span>
    </div>
  </div>

  <div class="gal-controls fade-block">
    <div class="gal-filters-group">
      <span class="gal-controls-label">Filter by</span>
      <div class="gal-filters" id="gal-filters">
        <button class="gal-filter-btn active" data-filter="*">All</button>
        <button class="gal-filter-btn" data-filter=".cat-illustration">Illustration</button>
        <button class="gal-filter-btn" data-filter=".cat-doodle">Doodle</button>
        <button class="gal-filter-btn" data-filter=".cat-render">Render</button>
        <button class="gal-filter-btn" data-filter=".cat-slander">Slander</button>
      </div>
    </div>
    <div class="gal-counts-group">
      <span class="gal-controls-label">Showing</span>
      <span class="gal-count-pill" id="gal-count">0 pieces</span>
    </div>
  </div>

  <div class="gal-search-wrap fade-block">
    <div class="gal-search-box">
      <i class="fa-solid fa-magnifying-glass gal-search-icon"></i>
      <input
        id="galSearch"
        class="gal-search-input"
        type="text"
        placeholder="Search by character…"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="gal-search-clear" id="galSearchClear" aria-label="Clear">✕</button>
    </div>
  </div>

  <div class="gal-grid-wrap fade-block">
    <div class="gal-masonry" id="gal-masonry">
      <div class="gal-gutter-sizer"></div>
      <div class="gal-col-sizer"></div>
    </div>
    <div class="gal-empty" id="gal-empty" style="display:none">
      <i class="fa-solid fa-scroll"></i>
      <p>No pieces found for this filter.</p>
    </div>
  </div>

  <!-- Lightbox — built by gallery-core.js at runtime with prefix "glb" -->

  <p class="gal-updated">
    <i class="fa-regular fa-clock"></i>
    Page last updated: <span id="galUpdateTime"></span>
  </p>

</div>
</div>

<footer-block class="fade-block"></footer-block>

<style>
/* ── Masthead ───────────────────────────────────────────── */
.gal-masthead {
  padding: 32px 40px 22px; margin-bottom: 0;
  position: relative; overflow: hidden;
}
.gal-masthead-inner { position: relative; z-index: 2; }
.gal-masthead-label {
  font-family: var(--f-label); font-size: 0.55rem; letter-spacing: 5px;
  text-transform: uppercase; color: var(--gold); opacity: 0.7;
  margin-bottom: 10px; text-align: center;
}
.gal-masthead-flex { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; }
.gal-masthead-title {
  font-family: var(--f-display); font-size: 2.2rem; letter-spacing: 3px;
  color: var(--frost); background: none; padding: 0;
  margin: 0 0 12px; line-height: 1.1; text-align: center;
}
.gal-masthead-watermark {
  font-family: var(--f-display); font-size: 5.5rem; color: rgba(201,168,76,0.14);
  letter-spacing: 8px; line-height: 1; white-space: nowrap;
  pointer-events: none; user-select: none; text-transform: uppercase;
  position: absolute; right: 50px; top: 82px;
}
.gal-masthead-rule { display: flex; align-items: center; gap: 10px; margin: 10px 0 14px; }
.gal-masthead-rule span { color: var(--gold); font-size: 0.7rem; flex-shrink: 0; }
.gal-rule-line { height: 1px; flex: 1; background: linear-gradient(90deg, var(--gold-dim), transparent); }
.gal-rule-line--rev { background: linear-gradient(270deg, var(--gold-dim), transparent); }
.gal-masthead-desc {
  font-family: var(--f-italic); font-style: italic;
  font-size: 1.2rem; line-height: 1.7; color: var(--fog); margin: 0; text-align: center;
}

.gal-card { width: calc(16.6667% - 8.34px); margin-bottom: 10px; cursor: pointer; }

.gal-card-hover-title {

}
.gal-card-hover-artist {
  font-family: var(--f-label); font-size: 0.6rem; letter-spacing: 1px;

.gal-card-hover-icon { position: absolute; top: 10px; right: 10px; color: rgba(201,168,76,0.7); font-size: 0.75rem; }
.gal-card-cat {
  position: absolute; top: 8px; left: 8px;
  font-family: var(--f-label); font-size: 0.5rem; letter-spacing: 2px;
  text-transform: uppercase; padding: 3px 8px;
}
.gal-card-cat--illustration { background: rgba(83,74,183,0.75);  color: #c9c5f5; }
.gal-card-cat--doodle       { background: rgba(15,110,86,0.75);   color: #9fe1cb; }
.gal-card-cat--render       { background: rgba(133,79,11,0.75);   color: #fac775; }
.gal-card-cat--slander      { background: rgba(153,60,29,0.75);   color: #f0997b; }

/* ── Empty state ────────────────────────────────────────── */
.gal-empty { text-align: center; padding: 60px 20px; color: var(--fog-dim); font-family: var(--f-label); letter-spacing: 2px; }
.gal-empty i { font-size: 2rem; opacity: 0.3; display: block; margin-bottom: 12px; }
.gal-empty p { font-size: 0.7rem; text-transform: uppercase; }

/* ── Lightbox — uses prefix "glb" from gallery-core ────── */
.glb-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(7,6,8,0.93);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
}
.glb-overlay--active { opacity: 1; pointer-events: all; }
.glb-close {
  position: fixed; top: 18px; right: 22px;
  background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
  color: var(--gold); font-size: 1.1rem;
  width: 38px; height: 38px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s ease; z-index: 2;
}
.glb-close:hover { background: rgba(201,168,76,0.2); }
.glb-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold); font-size: 1rem; width: 40px; height: 60px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s ease; z-index: 2;
}
.glb-nav:hover { background: rgba(201,168,76,0.18); }
.glb-nav--prev { left: 14px; }
.glb-nav--next { right: 14px; }
.glb-inner {
  display: flex; gap: 28px;
  max-width: min(1100px, 92vw); max-height: 90vh; align-items: flex-start;
}
.glb-img-wrap {
  position: relative; flex-shrink: 0; max-width: min(580px, 58vw);
  overflow: hidden; /* needed for zoom clipping */
  cursor: zoom-in;
}
.glb-img-wrap.glb-zoomed     { cursor: grab; }
.glb-img-wrap.glb-dragging   { cursor: grabbing; }
.glb-img {
  display: block; max-width: 100%; max-height: 85vh; object-fit: contain;
  border: 1px solid rgba(201,168,76,0.15); transition: opacity 0.3s ease;
  transform-origin: 0 0;
  will-change: transform;
  user-select: none;
  -webkit-user-drag: none;
}
.glb-img--loading { opacity: 0; }
/* suppress default transition during drag for performance */
.glb-img-wrap.glb-dragging .glb-img { transition: none !important; }

.glb-img-loader {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(201,168,76,0.4); font-size: 1.5rem;
  opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
}
.glb-img-loader--active { opacity: 1; }

/* ── Zoom controls ──────────────────────────────────────── */
.glb-zoom-bar {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 4px 6px;
  background: rgba(6,7,10,0.84);
  border: 1px solid rgba(201,168,76,0.22);
  backdrop-filter: blur(10px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s ease;
  white-space: nowrap;
}
/* always show bar when zoomed in; show on hover otherwise */
.glb-img-wrap:hover .glb-zoom-bar,
.glb-img-wrap.glb-zoomed .glb-zoom-bar {
  opacity: 1;
  pointer-events: all;
}
.glb-zoom-btn {
  background: none;
  border: 1px solid transparent;
  color: rgba(201,168,76,0.55);
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 0.72rem;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.glb-zoom-btn:hover:not(:disabled) {
  color: var(--gold);
  border-color: rgba(201,168,76,0.3);
  background: rgba(201,168,76,0.08);

.glb-zoom-btn:disabled { opacity: 0.22; cursor: default; pointer-events: none; }
.glb-zoom-pct {
  font-family: var(--f-label);
  font-size: 0.45rem;
  letter-spacing: 1.5px;
  color: rgba(201,168,76,0.55);

  text-align: center;
  padding: 0 3px;

}
.glb-zoom-sep {
  width: 1px; height: 14px;
  background: rgba(201,168,76,0.15);
  margin: 0 2px; flex-shrink: 0;
}

.glb-meta {
  flex: 1; overflow-y: auto; max-height: 85vh;
  padding-right: 4px; display: flex; flex-direction: column; gap: 14px;
}
.glb-meta-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.glb-tag {

  letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px;

.glb-tag--illustration { background: rgba(83,74,183,0.35); color: #c9c5f5; border: 1px solid rgba(83,74,183,0.5); }

.glb-counter { font-family: var(--f-label); font-size: 0.6rem; letter-spacing: 2px; color: var(--fog-dim); }
.glb-title {
  font-family: var(--f-display); font-size: 1.3rem; letter-spacing: 2px;
  color: var(--frost); margin: 0;
  border-bottom: 1px solid rgba(201,168,76,0.15); padding-bottom: 12px;
}
.glb-caption { font-family: var(--f-italic); font-style: italic; font-size: 0.9rem; line-height: 1.6; color: var(--fog); }
.glb-details { display: flex; flex-direction: column; gap: 8px; }
.glb-detail-row {
  display: flex; justify-content: space-between; align-items: center; gap: 12px;
  font-family: var(--f-label); font-size: 0.65rem; letter-spacing: 1.5px;
  padding-bottom: 6px; border-bottom: 1px dashed rgba(201,168,76,0.1);
}
.glb-detail-label { color: var(--fog-dim); text-transform: uppercase; }
.glb-detail-val   { color: var(--fog); text-align: right; }
.glb-chars-label {
  font-family: var(--f-label); font-size: 0.55rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--fog-dim); margin-bottom: 8px;
}
.glb-chars-list { display: flex; flex-wrap: wrap; gap: 6px; }
.glb-char-link {
  font-family: var(--f-label); font-size: 0.6rem; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--gold);
  border: 1px solid rgba(201,168,76,0.3); padding: 3px 10px;
  text-decoration: none; transition: background 0.2s ease;
}
.glb-char-link:hover { background: rgba(201,168,76,0.1); }
.glb-share-row { margin-top: auto; }
.glb-raw-link {
  font-family: var(--f-label); font-size: 0.6rem; letter-spacing: 2px;
  text-transform: uppercase; color: rgba(201,168,76,0.6);
  text-decoration: none; transition: color 0.2s ease;
}
.glb-raw-link:hover { color: var(--gold); }
.gal-updated {
  text-align: center; font-family: var(--f-label); font-size: 0.55rem;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--fog-dim); opacity: 0.5; padding: 0 0 32px;
}
.gal-updated i { margin-right: 6px; }

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 1300px) { .gal-col-sizer, .gal-card { width: calc(20% - 8px); } }
@media (max-width: 1050px) { .gal-col-sizer, .gal-card { width: calc(25% - 7.5px); } }
@media (max-width: 800px) {
  .gal-col-sizer, .gal-card { width: calc(33.333% - 6.67px); }
  .gal-masthead { padding: 24px 20px 18px; }
  .gal-masthead-title { font-size: 1.6rem; }
  .gal-masthead-watermark { display: none; }
  /* on mobile lightbox, image wrap is full width so zoom bar can live inside */
  .glb-img-wrap { max-width: 100% !important; }
}
@media (max-width: 500px) { .gal-col-sizer, .gal-card { width: calc(50% - 5px); } }
</style>

<script>
/* ═══════════════════════════════════════════════════════════════
   LIGHTBOX ZOOM MODULE
   Self-contained. Call LightboxZoom.attach(imgWrapEl) once after
   the lightbox DOM exists, then LightboxZoom.reset() on close /
   image navigation.
═══════════════════════════════════════════════════════════════ */
const LightboxZoom = (() => {
  const MIN   = 1;
  const MAX   = 5;
  const STEP  = 0.55;   // button step
  const CLICK_STEP = 1.2; // single-click step

  let wrap, img, bar, pctLabel, btnOut, btnIn, btnReset;
  let scale = 1, ox = 0, oy = 0;
  let dragging = false, dsx, dsy, dox, doy;
  let lastClickTime = 0;
  // touch pinch state
  let lastPinchDist = null;
  // single-finger pan state
  let touchPanOrigin = null;
  // whether we moved enough to count as a drag (suppress click)
  let didDrag = false;

  /* ── clamp pan offsets so image never leaves the viewport ── */
  function clamp(s, x, y) {
    const ww = wrap.clientWidth;
    const wh = wrap.clientHeight;
    // natural rendered size of image at scale=1
    const iw = img.offsetWidth;
    const ih = img.offsetHeight;
    const rw = iw * s;
    const rh = ih * s;
    return {
      x: rw  <= ww ? (ww - rw) / 2  : Math.max(ww - rw,  Math.min(0, x)),
      y: rh  <= wh ? (wh - rh) / 2  : Math.max(wh - rh,  Math.min(0, y))
    };
  }

  /* ── apply CSS transform ─────────────────────────────────── */
  function apply(animate) {
    if (!img) return;
    img.style.transition = animate
      ? 'transform 0.24s cubic-bezier(0.25,0.8,0.25,1), opacity 0.3s ease'
      : 'opacity 0.3s ease';
    img.style.transformOrigin = '0 0';
    img.style.transform = `translate(${ox}px,${oy}px) scale(${scale})`;

    // update bar UI
    const pct = Math.round(scale * 100);
    if (pctLabel)  pctLabel.textContent = pct + '%';
    if (btnOut)    btnOut.disabled  = scale <= MIN;
    if (btnIn)     btnIn.disabled   = scale >= MAX;
    if (btnReset)  btnReset.disabled = scale === MIN;

    wrap.classList.toggle('glb-zoomed', scale > MIN);
  }

  /* ── zoom toward a pivot point (wrap-local px coords) ────── */
  function zoomTo(newS, px, py) {
    newS = Math.max(MIN, Math.min(MAX, newS));
    const ratio = newS / scale;
    ox = px - ratio * (px - ox);
    oy = py - ratio * (py - oy);
    scale = newS;
    const c = clamp(scale, ox, oy);
    ox = c.x; oy = c.y;
    apply(true);
  }

  /* ── reset everything ────────────────────────────────────── */
  function reset() {
    scale = 1; ox = 0; oy = 0;
    dragging = false; didDrag = false;
    lastPinchDist = null; touchPanOrigin = null;
    if (img) {
      img.style.transform = '';
      img.style.transition = '';
      img.style.transformOrigin = '';
    }
    if (wrap) {
      wrap.classList.remove('glb-zoomed', 'glb-dragging');
    }
    if (pctLabel)  pctLabel.textContent = '100%';
    if (btnOut)    btnOut.disabled  = true;
    if (btnIn)     btnIn.disabled   = false;
    if (btnReset)  btnReset.disabled = true;
  }

  /* ── build the zoom bar DOM ──────────────────────────────── */
  function buildBar() {
    const el = document.createElement('div');
    el.className = 'glb-zoom-bar';
    el.innerHTML = `
      <button class="glb-zoom-btn" data-z="out"   title="Zoom out"><i class="fa-solid fa-minus"></i></button>
      <span   class="glb-zoom-pct">100%</span>
      <button class="glb-zoom-btn" data-z="in"    title="Zoom in"><i class="fa-solid fa-plus"></i></button>
      <div    class="glb-zoom-sep"></div>
      <button class="glb-zoom-btn" data-z="reset" title="Reset zoom"><i class="fa-solid fa-compress"></i></button>
    `;
    // stop bar clicks from bubbling to the wrap (which has click-to-zoom)
    el.addEventListener('mousedown', e => e.stopPropagation());
    el.addEventListener('click', e => {
      e.stopPropagation();
      const btn = e.target.closest('[data-z]');
      if (!btn) return;
      const cx = wrap.clientWidth  / 2;
      const cy = wrap.clientHeight / 2;
      if      (btn.dataset.z === 'in')    zoomTo(scale + STEP, cx, cy);
      else if (btn.dataset.z === 'out')   zoomTo(scale - STEP, cx, cy);
      else if (btn.dataset.z === 'reset') reset();
    });
    return el;
  }

  /* ── get wrap-local coords from a mouse/touch event ──────── */
  function localCoords(e) {
    const r = wrap.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    return { cx, cy };
  }

  /* ── attach once to the .glb-img-wrap element ────────────── */
  function attach(imgWrap) {
    if (imgWrap._zoomBound) return;
    imgWrap._zoomBound = true;
    wrap = imgWrap;

    // img may not exist yet when we attach; resolve lazily
    function getImg() {
      if (!img) img = wrap.querySelector('.glb-img');
      return img;
    }

    // inject zoom bar
    bar      = buildBar();
    pctLabel = bar.querySelector('.glb-zoom-pct');
    btnOut   = bar.querySelector('[data-z="out"]');
    btnIn    = bar.querySelector('[data-z="in"]');
    btnReset = bar.querySelector('[data-z="reset"]');
    wrap.appendChild(bar);

    // initialise disabled states
    btnOut.disabled   = true;
    btnReset.disabled = true;

    /* ── scroll-wheel zoom ─── */
    wrap.addEventListener('wheel', e => {
      e.preventDefault();
      getImg();
      const { cx, cy } = localCoords(e);
      const delta = e.deltaY < 0 ? STEP * 0.45 : -STEP * 0.45;
      zoomTo(scale + delta, cx, cy);
    }, { passive: false });

    /* ── mouse: click to zoom / double-click to reset ─── */
    wrap.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      getImg();
      if (scale > MIN) {
        dragging = true; didDrag = false;
        dsx = e.clientX; dsy = e.clientY;
        dox = ox; doy = oy;
        wrap.classList.add('glb-dragging');
        e.preventDefault(); // prevent text selection while dragging
      }
    });

    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = e.clientX - dsx;
      const dy = e.clientY - dsy;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
      const c = clamp(scale, dox + dx, doy + dy);
      ox = c.x; oy = c.y;
      apply(false);
    });

    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      wrap.classList.remove('glb-dragging');
    });

    wrap.addEventListener('click', e => {
      // ignore clicks that were actually drags
      if (didDrag) { didDrag = false; return; }
      getImg();
      const now = Date.now();
      const { cx, cy } = localCoords(e);
      if (now - lastClickTime < 320) {
        // double-click → reset
        reset();
        lastClickTime = 0;
      } else {
        lastClickTime = now;
        // single click: zoom in (or reset if already at max)
        if (scale >= MAX) reset();
        else zoomTo(scale + CLICK_STEP, cx, cy);
      }
    });

    /* ── touch: pinch-to-zoom ─── */
    wrap.addEventListener('touchstart', e => {
      getImg();
      if (e.touches.length === 2) {
        lastPinchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        touchPanOrigin = null; // cancel pan while pinching
      } else if (e.touches.length === 1 && scale > MIN) {
        touchPanOrigin = { x: e.touches[0].clientX, y: e.touches[0].clientY, ox, oy };
      }
    }, { passive: true });

    wrap.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && lastPinchDist !== null) {
        e.preventDefault();
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const r = wrap.getBoundingClientRect();
        const mx = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - r.left;
        const my = ((e.touches[0].clientY + e.touches[1].clientY) / 2) - r.top;
        zoomTo(scale * (dist / lastPinchDist), mx, my);
        lastPinchDist = dist;
      } else if (e.touches.length === 1 && touchPanOrigin && scale > MIN) {
        e.preventDefault();
        const dx = e.touches[0].clientX - touchPanOrigin.x;
        const dy = e.touches[0].clientY - touchPanOrigin.y;
        const c = clamp(scale, touchPanOrigin.ox + dx, touchPanOrigin.oy + dy);
        ox = c.x; oy = c.y;
        apply(false);
      }
    }, { passive: false });

    wrap.addEventListener('touchend', e => {
      if (e.touches.length < 2) lastPinchDist = null;
      if (e.touches.length < 1) touchPanOrigin = null;
    });
  }

  /* ── called when lightbox navigates to a new image ───────── */
  function onImageChange() {
    img = null; // re-resolve on next interaction
    reset();
  }

  return { attach, reset, onImageChange };
})();
</script>

<script>
(async () => {

  /* ─── 1. Load data ──────────────────────────────────────── */
  let items = await GalleryCore.fetchItems();

  /* ─── 2. Helpers ────────────────────────────────────────── */
  const parseDate = GalleryCore.parseDate;
  const dateToMs  = GalleryCore.dateToMs;
  const catLabel  = GalleryCore.CAT_LABEL_SM;

  /* ─── 3. Sort ───────────────────────────────────────────── */
  items.sort((a, b) => dateToMs(b.date) - dateToMs(a.date));

  /* ─── 4. DOM refs ───────────────────────────────────────── */
  const grid        = document.getElementById('gal-masonry');
  const emptyMsg    = document.getElementById('gal-empty');
  const searchInput = document.getElementById('galSearch');
  const searchClear = document.getElementById('galSearchClear');
  const galCount    = document.getElementById('gal-count');

  /* ─── 5. Stats ──────────────────────────────────────────── */
  const allArtists = [...new Set(items.map(i => i.artist).filter(Boolean))];
  document.getElementById('stat-total').textContent   = items.length;
  document.getElementById('stat-artists').textContent = allArtists.length;
  document.getElementById('stat-updated').textContent = items.length ? parseDate(items[0].date) : '—';

  /* ─── 6. State ──────────────────────────────────────────── */
  let activeFilter  = '*';
  let searchQuery   = '';
  let iso           = null;
  let visibleItems  = [...items];
  let lightboxIndex = 0;

  /* ─── 7. Lightbox ───────────────────────────────────────── */
  const lightbox = GalleryCore.buildLightbox({ prefix: 'glb', showChars: true });

  /* After the lightbox DOM exists (first open), attach zoom once */
  let zoomAttached = false;
  function maybeAttachZoom() {
    if (zoomAttached) return;
    const imgWrap = document.querySelector('.glb-img-wrap');
    if (!imgWrap) return;
    zoomAttached = true;
    LightboxZoom.attach(imgWrap);
  }

  /* Patch nav buttons to reset zoom on image change */
  function patchNavButtons() {
    document.querySelectorAll('.glb-nav').forEach(btn => {
      btn.addEventListener('click', () => {
        LightboxZoom.onImageChange();
      });
    });
    // also reset on close
    const closeBtn = document.querySelector('.glb-close');
    if (closeBtn) {
      closeBtn.addEventListener('click', () => LightboxZoom.reset());
    }
    // reset on overlay backdrop click
    const overlay = document.querySelector('.glb-overlay');
    if (overlay) {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) LightboxZoom.reset();
      });
    }
  }

  function openLightbox(vi) {
    lightboxIndex = vi;
    lightbox.open(visibleItems, vi);

    /* Wait a tick for GalleryCore to inject the lightbox DOM */
    requestAnimationFrame(() => {
      maybeAttachZoom();
      patchNavButtons();
      // reset zoom whenever we switch images via keyboard too
      document.addEventListener('keydown', onKey, { once: false });
    });
  }

  function onKey(e) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
      LightboxZoom.onImageChange();
    }
    if (e.key === 'Escape') {
      LightboxZoom.reset();
    }
  }

  /* ─── 8. Cards ──────────────────────────────────────────── */
  const frag = document.createDocumentFragment();
  items.forEach((item, i) => {
    const card = GalleryCore.buildCard(item, i, {
      cardClass: 'gal-card',
      prefix:    'gal',
      onClick:   (item, i) => {
        const vi = visibleItems.indexOf(item);
        if (vi !== -1) openLightbox(vi);
      },
    });
    frag.appendChild(card);
  });
  grid.appendChild(frag);

  /* ─── 9. Isotope ────────────────────────────────────────── */
  iso = new Isotope(grid, {
    itemSelector:       '.gal-card',
    layoutMode:         'masonry',
    masonry: { columnWidth: '.gal-col-sizer', gutter: '.gal-gutter-sizer' },
    percentPosition:    true,
    transitionDuration: '0.3s',
    hiddenStyle:  { opacity: 0 },
    visibleStyle: { opacity: 1 },
  });

  /* ─── 10. Images + fade-in ──────────────────────────────── */
  window.addEventListener('load', () => {
    grid.querySelectorAll('.gal-card').forEach(card => {
      GalleryCore.loadCardImage(card, { prefix: 'gal', onLoad: () => iso.layout() });
    });
    document.querySelectorAll('.gal-card').forEach((c, i) => {
      c.style.opacity = '0';
      setTimeout(() => { c.style.opacity = ''; }, Math.min(i * 30, 500));
    });
    document.querySelectorAll('.fade-block').forEach((el, i) =>
      setTimeout(() => el.classList.add('visible'), i * 70)
    );
  });

  /* ─── 11. Filter helpers ────────────────────────────────── */
  function applyFilters() {
    iso.arrange({
      filter: el => {
        const chars  = el.dataset.chars || '';
        const matchQ = !searchQuery || chars.split('|').some(n => n.includes(searchQuery));
        const matchF = activeFilter === '*' || el.matches(activeFilter);
        return matchQ && matchF;
      }
    });
    updateCount();
  }

  function updateCount() {
    setTimeout(() => {
      const shown = [...grid.querySelectorAll('.gal-card')]
        .filter(c => c.style.display !== 'none').length;
      galCount.textContent = `${shown} piece${shown !== 1 ? 's' : ''}`;
      emptyMsg.style.display = shown === 0 ? 'block' : 'none';
      visibleItems = [...grid.querySelectorAll('.gal-card')]
        .filter(c => c.style.display !== 'none')
        .map(c => items[+c.dataset.index]);
    }, 350);
  }

  /* ─── 12. Filter buttons ────────────────────────────────── */
  document.querySelectorAll('.gal-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gal-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  /* ─── 13. Search ────────────────────────────────────────── */
  let searchTimer;
  searchInput.addEventListener('input', function () {
    clearTimeout(searchTimer);
    const val = this.value.trim().toLowerCase();
    searchTimer = setTimeout(() => {
      searchQuery = val;
      applyFilters();
      searchClear.classList.toggle('visible', val.length > 0);
    }, 160);
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchClear.classList.remove('visible');
    applyFilters();
    searchInput.focus();
  });

  /* ─── 14. Resize ────────────────────────────────────────── */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => iso.layout(), 150);
  });

  /* ─── 15. Init ──────────────────────────────────────────── */
  galCount.textContent = `${items.length} pieces`;
  visibleItems = [...items];
  document.getElementById('galUpdateTime').textContent = document.lastModified;
  document.body.style.visibility = 'visible';

})();
</script>

</body>
</html>
