<script>

<!-- ─── GLOSSARY BUILDER ──────────────────────────────── -->
<script>
(function () {

  const GLOSSARY_PATH = window.GLOSSARY_PATH || '/scripts/glossary.json';
  const ALPHABET = 'abcdefghijklmnopqrstuvwxyz'.split('');

  // ── Fetch & build ─────────────────────────────────────
  fetch(GLOSSARY_PATH)
    .then(r => {
      if (!r.ok) throw new Error('Could not load glossary.json — status ' + r.status);
      return r.json();
    })
    .then(raw => {
      // Support both plain array and { terms: [], blacklist: [] } formats
      const data = Array.isArray(raw) ? raw : (raw.terms || []);
      buildPage(data);
    })
    .catch(err => {
      document.getElementById('glossLoading').innerHTML =
        '<span style="color:var(--fog-dim);font-style:italic;">Could not load glossary. (' + err.message + ')</span>';
      console.error('[quill-and-terms]', err);
    });

  // ── Group entries by first letter ─────────────────────
  function groupByLetter(entries) {
    const map = {};
    entries.forEach(entry => {
      if (!entry.term || !entry.definition) return;

      // Strip leading "The " for sorting purposes but keep display name intact
      const sortKey = entry.term.replace(/^the\s+/i, '').trim();
      const letter  = sortKey[0].toLowerCase();

      if (!map[letter]) map[letter] = [];
      map[letter].push(entry);
    });

    // Sort each letter's entries alphabetically (same strip logic)
    Object.keys(map).forEach(letter => {
      map[letter].sort((a, b) => {
        const ka = a.term.replace(/^the\s+/i, '').toLowerCase();
        const kb = b.term.replace(/^the\s+/i, '').toLowerCase();
        return ka.localeCompare(kb);
      });
    });

    return map;
  }

  // ── Deduplicate: if singular and plural both exist, keep both ─
  // (no dedup needed — we show everything in the JSON as-is)

  // ── Build the page ─────────────────────────────────────
  function buildPage(entries) {
    const grouped     = groupByLetter(entries);
    const usedLetters = new Set(Object.keys(grouped));

    // 1. Update alphabet nav — dim letters with no content
    const alphaLinks = document.getElementById('glossAlphaLinks');
    alphaLinks.innerHTML = '';                // clear static fallback

    ALPHABET.forEach(letter => {
      const a = document.createElement('a');
      a.href        = '#' + letter;
      a.textContent = letter.toUpperCase();

      if (!usedLetters.has(letter)) {
        a.classList.add('gloss-alpha-empty');
        a.removeAttribute('href');           // not a real link
        a.setAttribute('aria-disabled', 'true');
      }

      alphaLinks.appendChild(a);
    });

    // "back to top" arrow
    const top = document.createElement('a');
    top.href      = '#top';
    top.className = 'gloss-alpha-top';
    top.title     = 'Back to top';
    top.textContent = '↑';
    alphaLinks.appendChild(top);

    // 2. Build sections
    const body = document.getElementById('glossBody');
    body.innerHTML = '';

    ALPHABET.forEach(letter => {
      if (!usedLetters.has(letter)) return;

      const termList = grouped[letter];

      // Section wrapper
      const section = document.createElement('div');
      section.className = 'gloss-section';

      // Letter heading
      const h3 = document.createElement('h3');
      h3.className = 'gloss-letter';
      h3.id        = letter;
      h3.textContent = letter.toUpperCase();
      section.appendChild(h3);

      // Rule under letter
      const ruleWrap = document.createElement('div');
      ruleWrap.className = 'gloss-rule-sm';
      ruleWrap.innerHTML = '<div class="gloss-rule-line-sm"></div>';
      section.appendChild(ruleWrap);

      // List
      const ul = document.createElement('ul');
      ul.className = 'gloss-list';

      termList.forEach(entry => {
        const li = document.createElement('li');

        // Term
        const termSpan = document.createElement('span');
        termSpan.className   = 'gloss-term';
        termSpan.textContent = entry.term;
        li.appendChild(termSpan);

        // Diamond separator
        const dot = document.createElement('span');
        dot.className   = 'gloss-dot';
        dot.textContent = '◆';
        li.appendChild(dot);

        // Definition text node
        li.appendChild(document.createTextNode(entry.definition));

        // Optional "see more" link
        if (entry.link) {
          const more = document.createElement('a');
          more.href      = entry.link;
          more.className = 'gloss-entry-link';
          more.innerHTML = ' <i class="fa-solid fa-arrow-right"></i>';
          more.title     = 'Read more about ' + entry.term;
          li.appendChild(more);
        }

        ul.appendChild(li);
      });

      section.appendChild(ul);
      body.appendChild(section);
    });

    // 3. Hide loading spinner
    document.getElementById('glossLoading').style.display = 'none';
  }

})();
</script>
